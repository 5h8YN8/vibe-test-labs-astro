name: Add Policy Pages and Deploy


on:
  workflow_dispatch:


jobs:
  add-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}


      - name: Write pages files
        run: |
          echo "


      - name: Commit new pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git commit -m "Add policy pages (terms, privacy, faq, track-order) and update footer" || echo "Nothing to commit"


      - name: Push changes
        run: git push


      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'


      - name: Install dependencies
        run: npm ci
