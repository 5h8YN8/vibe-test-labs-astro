name: Add Policy Pages and Deploy
on:
  workflow_dispatch:
jobs:
  add-pages-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - name: Write new pages and update footer
        run: echo "" | base64 -d | gunzip | python3
      - name: Commit new pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/pages/terms.astro src/pages/privacy.astro src/pages/faq.astro src/pages/track-order.astro src/layouts/BaseLayout.astro
          git diff --cached --quiet && echo "No changes" || git commit -m "Add terms, privacy, FAQ, and track-order pages; update footer links"
          git push || true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: vibe-test-labs
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
