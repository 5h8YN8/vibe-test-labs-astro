name: Fix Pricing Position and Deploy

on:
  workflow_dispatch:

jobs:
  fix-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - name: Move price-urgency-block inside buy-box
        run: echo "" | base64 -d | python3
      - name: Commit pricing layout fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/pages/products/
          git diff --cached --quiet && echo "No pricing changes" || git commit -m "Move price-urgency-block inside buy-box on all product pages"
          git push || true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: vibe-test-labs
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
